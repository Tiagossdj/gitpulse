name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: API — typecheck
        run: pnpm --filter @gitpulse/api exec tsc -p tsconfig.json

      - name: API — tests
        run: pnpm --filter @gitpulse/api exec vitest run

      - name: API — lint
        run: pnpm --filter @gitpulse/api run lint

      - name: Web — lint
        run: pnpm --filter @gitpulse/web run lint

      - name: Web — build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
        run: pnpm --filter @gitpulse/web run build
